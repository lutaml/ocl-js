name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          # NO registry-url — prevents setup-node from writing _authToken
          # to .npmrc, which would shadow OIDC auth from trusted publishing.

      - name: Upgrade npm (Trusted Publishers needs npm ≥10.9.1)
        run: npm install -g npm@latest && npm --version

      - run: npm ci

      - run: npm run build

      - run: npm test

      - run: npm publish --provenance --access public
